version: '3.8'

services:
  # ---------------- BACKEND SERVICES ----------------
  ticket-backend:
    build:
      context: ./ticket-backend
    container_name: ticket_backend
    ports:
      - "8080:8080"
    env_file:
      - .env # Ensure your root .env contains DB_URL, REDIS_URL, KAFKA_SERVERS, etc.
    environment:
      - SPRING_KAFKA_SSL_TRUST_STORE_LOCATION=file:///app/ca.pem

  realtime-service:
    build:
      context: ./realtime-service
    container_name: realtime_service
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - SPRING_KAFKA_SSL_TRUST_STORE_LOCATION=file:///app/ca.pem
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  # ---------------- FRONTEND ----------------
  ticket-frontend:
    build:
      context: ./ticket-frontend
    container_name: ticket_frontend
    ports:
      - "3000:80" # Maps port 3000 on your machine to Nginx's port 80 inside the container
    depends_on:
      - ticket-backend
      - realtime-service
