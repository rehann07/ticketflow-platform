version: '3.8'

services:
  # ---------------- INFRASTRUCTURE ----------------
  postgres:
    image: postgres:15
    container_name: support_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: support_ticket_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data

  postgres-notification:
    image: postgres:15
    container_name: notification_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: notification_db
    ports:
      - "5434:5432"
    volumes:
      - notification_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: support_cache
    ports:
      - "6379:6379"

  # ---------------- APPLICATIONS ----------------
  ticket-backend:
    build:
      context: ./ticket-backend
    container_name: ticket_backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      # Override application.properties to point to the Docker containers
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/support_ticket_db
      - SPRING_DATA_REDIS_HOST=support_cache
      - SPRING_DATA_REDIS_PORT=6379

  notification-system:
    build:
      context: ./notification-system
    container_name: notification_system
    ports:
      - "8081:8081"
    depends_on:
      - postgres-notification
      - redis
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-notification:5432/notification_db
      - SPRING_DATA_REDIS_HOST=support_cache
      - SPRING_DATA_REDIS_PORT=6379

  ticket-frontend:
    build:
      context: ./ticket-frontend
    container_name: ticket_frontend
    ports:
      - "3000:80" # Maps port 3000 on your machine to Nginx's port 80 inside the container
    depends_on:
      - ticket-backend
      - notification-system

volumes:
  postgres_data_v2:
  notification_data: